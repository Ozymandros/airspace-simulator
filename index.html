<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Airspace Simulator</title>
</head>
<body>
  <div id="info">
    <h1>Airspace Simulator</h1>
    <p>Click an aircraft to follow &ndash; ESC to release</p>
    <p>Drag to orbit &middot; right-drag to pan &middot; wheel to zoom</p>
    <p>Space pause &middot; keys <kbd>1</kbd> <kbd>2</kbd> <kbd>4</kbd> time scale</p>
    <p id="sim-status">Running &middot; 1&times;</p>
    <p id="tracking"></p>
    <div id="fleet" aria-label="Select an aircraft to follow"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
