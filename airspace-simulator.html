<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Airspace Simulator</title>
<style>
  :root {
    --panel-bg: rgba(8, 14, 30, 0.78);
    --panel-line: rgba(136, 170, 255, 0.35);
    --text: #dbe6ff;
    --text-dim: #8aa0cc;
  }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #9cc4e4; }
  body { font-family: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, monospace; }
  canvas { display: block; }
  #info {
    position: absolute; top: 14px; left: 14px; z-index: 10;
    color: var(--text); background: var(--panel-bg);
    border: 1px solid var(--panel-line); border-radius: 8px;
    padding: 12px 16px; min-width: 240px;
    backdrop-filter: blur(6px); user-select: none;
  }
  #info h1 {
    margin: 0 0 8px; font-size: 12px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--text);
  }
  #info p { margin: 4px 0; font-size: 12px; color: var(--text-dim); }
  #tracking { min-height: 16px; font-size: 12px; color: var(--text); }
  #tracking .swatch {
    display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    margin-right: 6px; vertical-align: baseline;
    box-shadow: 0 0 6px 1px currentColor;
  }
  #fleet { margin-top: 10px; display: flex; gap: 7px; flex-wrap: wrap; }
  #fleet button {
    width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.25); padding: 0;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  #fleet button:hover { transform: scale(1.25); }
  #fleet button:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  #fleet button.active { box-shadow: 0 0 8px 2px currentColor; transform: scale(1.25); }
  @media (prefers-reduced-motion: reduce) {
    #fleet button { transition: none; }
  }
</style>
</head>
<body>
<div id="info">
  <h1>Airspace Simulator</h1>
  <p>Click an aircraft to follow &ndash; ESC to release</p>
  <p>Drag to orbit &middot; right-drag to pan &middot; wheel to zoom</p>
  <p id="tracking"></p>
  <div id="fleet" aria-label="Select an aircraft to follow"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "yuka": "https://cdn.jsdelivr.net/npm/yuka@0.7.8/build/yuka.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import * as YUKA from 'yuka';

// ---------------------------------------------------------------- constants
const BOX_SIZE = 200;
const HALF = BOX_SIZE / 2;
const AIRCRAFT_COUNT = 20;
const COLORS = ['#FF3333','#33FF33','#3355FF','#FFAA00','#FF33FF',
                '#00CCCC','#FFDD44','#FF6644','#88FF88','#AA88FF',
                '#FF88CC','#44DDFF','#CCAA33','#66FFCC','#DD6644',
                '#FF0000','#00FF00','#0000FF','#FFFF00','#FF00FF'];
const TRAIL_LENGTH = 70;

// ---------------------------------------------------------------- three.js
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9cc4e4);
scene.fog = new THREE.Fog(0x9cc4e4, 400, 1100);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1600);
camera.position.set(150, 120, 200);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xbfd4ee, 0.7));
scene.add(new THREE.HemisphereLight(0xcfe5ff, 0x6a7c52, 0.9));
const sun = new THREE.DirectionalLight(0xffffff, 2.2);
sun.position.set(120, 250, 160);
scene.add(sun);

// ---------------------------------------------------------------- landscape
const GROUND_Y = -HALF;

// Mountains rise with distance from the centre; the ground directly under
// the airspace stays perfectly flat so it never intrudes into the box.
function terrainHeight(x, z) {
  const d = Math.hypot(x, z);
  const m = THREE.MathUtils.smoothstep(d, 220, 520);
  const ridges =
    Math.abs(Math.sin(x * 0.012) * Math.cos(z * 0.014)) * 55 +
    Math.abs(Math.sin(x * 0.031 + 1.7) * Math.sin(z * 0.027 + 4.2)) * 24 +
    Math.sin(x * 0.07 + z * 0.05) * 5;
  const rolling = Math.sin(x * 0.05) * Math.cos(z * 0.045) * 2
                * THREE.MathUtils.smoothstep(d, 115, 170);
  return ridges * m + rolling * (1 - m);
}

{
  const geo = new THREE.PlaneGeometry(1200, 1200, 96, 96);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  const colors = new Float32Array(pos.count * 3);
  const grass = new THREE.Color(0x55803f);
  const rock  = new THREE.Color(0x8a7f72);
  const snow  = new THREE.Color(0xeef3f8);
  const c = new THREE.Color();
  for (let i = 0; i < pos.count; i++) {
    const h = terrainHeight(pos.getX(i), pos.getZ(i));
    pos.setY(i, h);
    if (h > 48) c.copy(rock).lerp(snow, THREE.MathUtils.smoothstep(h, 48, 65));
    else c.copy(grass).lerp(rock, THREE.MathUtils.smoothstep(h, 12, 48));
    colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.computeVertexNormals();
  const terrain = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    vertexColors: true, flatShading: true, roughness: 1
  }));
  terrain.position.y = GROUND_Y;
  scene.add(terrain);
}

// Shared scatter helper: random radial placement on low, flat-enough ground,
// always outside the airspace footprint.
const dummy = new THREE.Object3D();
function scatter(count, minD, maxD, maxH, place) {
  let placed = 0, guard = 0;
  while (placed < count && guard++ < count * 40) {
    const ang = Math.random() * Math.PI * 2;
    const d = THREE.MathUtils.randFloat(minD, maxD);
    const x = Math.cos(ang) * d, z = Math.sin(ang) * d;
    if (Math.max(Math.abs(x), Math.abs(z)) < 104) continue; // keep clear of the box
    const h = terrainHeight(x, z);
    if (h > maxH) continue;
    place(placed++, x, GROUND_Y + h, z);
  }
  return placed;
}

// Trees: instanced trunks + conical canopies on the lower slopes
{
  const TREES = 110;
  const trunks = new THREE.InstancedMesh(
    new THREE.CylinderGeometry(0.35, 0.5, 3, 5),
    new THREE.MeshStandardMaterial({ color: 0x6b4a2f, flatShading: true }), TREES);
  const canopies = new THREE.InstancedMesh(
    new THREE.ConeGeometry(2.4, 6.5, 6),
    new THREE.MeshStandardMaterial({ color: 0x2f5e33, flatShading: true }), TREES);
  const n = scatter(TREES, 110, 400, 20, (i, x, y, z) => {
    const s = THREE.MathUtils.randFloat(0.8, 1.7);
    dummy.position.set(x, y + 1.5 * s, z);
    dummy.rotation.set(0, Math.random() * Math.PI * 2, 0);
    dummy.scale.setScalar(s);
    dummy.updateMatrix();
    trunks.setMatrixAt(i, dummy.matrix);
    dummy.position.y = y + 5.2 * s; // canopy sits on the trunk
    dummy.updateMatrix();
    canopies.setMatrixAt(i, dummy.matrix);
  });
  trunks.count = canopies.count = n;
  scene.add(trunks, canopies);
}

// Houses: instanced bodies + pyramid roofs in the flat valley ring
{
  const HOUSES = 16;
  const bodies = new THREE.InstancedMesh(
    new THREE.BoxGeometry(6, 4, 5),
    new THREE.MeshStandardMaterial({ flatShading: true }), HOUSES);
  const roofs = new THREE.InstancedMesh(
    new THREE.ConeGeometry(4.4, 2.8, 4),
    new THREE.MeshStandardMaterial({ color: 0xa8523c, flatShading: true }), HOUSES);
  const walls = [0xe8e0cf, 0xd9c9a8, 0xcfd8e0, 0xe3d2c2];
  const wallColor = new THREE.Color();
  const n = scatter(HOUSES, 110, 300, 8, (i, x, y, z) => {
    const s = THREE.MathUtils.randFloat(0.9, 1.4);
    const rot = Math.random() * Math.PI * 2;
    dummy.position.set(x, y + 2 * s, z);
    dummy.rotation.set(0, rot, 0);
    dummy.scale.setScalar(s);
    dummy.updateMatrix();
    bodies.setMatrixAt(i, dummy.matrix);
    bodies.setColorAt(i, wallColor.setHex(walls[i % walls.length]));
    dummy.position.y = y + 5.4 * s;
    dummy.rotation.y = rot + Math.PI / 4; // align pyramid roof with the walls
    dummy.updateMatrix();
    roofs.setMatrixAt(i, dummy.matrix);
  });
  bodies.count = roofs.count = n;
  scene.add(bodies, roofs);
}

// Clouds: puffy sphere clusters drifting slowly across the sky
const clouds = [];
{
  const cloudMat = new THREE.MeshStandardMaterial({
    color: 0xffffff, flatShading: true, transparent: true, opacity: 0.92, roughness: 1
  });
  const puffGeo = new THREE.SphereGeometry(1, 7, 5);
  for (let i = 0; i < 9; i++) {
    const cloud = new THREE.Group();
    const puffs = 3 + Math.floor(Math.random() * 4);
    for (let p = 0; p < puffs; p++) {
      const puff = new THREE.Mesh(puffGeo, cloudMat);
      puff.position.set(
        THREE.MathUtils.randFloatSpread(16),
        THREE.MathUtils.randFloatSpread(3),
        THREE.MathUtils.randFloatSpread(7)
      );
      puff.scale.set(
        THREE.MathUtils.randFloat(5, 10),
        THREE.MathUtils.randFloat(2.6, 4.5),
        THREE.MathUtils.randFloat(4, 7)
      );
      cloud.add(puff);
    }
    cloud.position.set(
      THREE.MathUtils.randFloatSpread(900),
      THREE.MathUtils.randFloat(125, 190),
      THREE.MathUtils.randFloatSpread(900)
    );
    cloud.userData.speed = THREE.MathUtils.randFloat(1.5, 4);
    clouds.push(cloud);
    scene.add(cloud);
  }
}

// The airspace boundary is now invisible — containment steering still keeps
// all aircraft inside the same 200-unit cube.

// ---------------------------------------------------------------- yuka world
const entityManager = new YUKA.EntityManager();
const time = new YUKA.Time();

// Keeps vehicles inside the airspace: a smooth inward push that grows
// quadratically as a vehicle enters the margin zone near any wall.
class ContainmentBehavior extends YUKA.SteeringBehavior {
  constructor(half = HALF, margin = 30, strength = 60) {
    super();
    this.half = half;
    this.margin = margin;
    this.strength = strength;
  }
  calculate(vehicle, force /*, delta */) {
    const inner = this.half - this.margin;
    for (const axis of ['x', 'y', 'z']) {
      const p = vehicle.position[axis];
      if (p > inner) {
        const t = Math.min((p - inner) / this.margin, 1.5);
        force[axis] -= t * t * this.strength;
      } else if (p < -inner) {
        const t = Math.min((-p - inner) / this.margin, 1.5);
        force[axis] += t * t * this.strength;
      }
    }
    return force;
  }
}

// Gentle, plane-like altitude changes: each aircraft periodically picks a new
// cruise altitude and eases toward it. (Yuka's WanderBehavior is planar, so
// this supplies the natural vertical motion.)
class AltitudeWanderBehavior extends YUKA.SteeringBehavior {
  constructor() {
    super();
    this.targetY = THREE.MathUtils.randFloat(-HALF + 35, HALF - 35);
    this.timer = THREE.MathUtils.randFloat(4, 12);
  }
  calculate(vehicle, force, delta) {
    this.timer -= delta;
    if (this.timer <= 0) {
      this.targetY = THREE.MathUtils.randFloat(-HALF + 35, HALF - 35);
      this.timer = THREE.MathUtils.randFloat(8, 16);
    }
    force.y += THREE.MathUtils.clamp((this.targetY - vehicle.position.y) * 0.4, -6, 6);
    return force;
  }
}

// Syncs a Yuka entity's transform onto its Three.js render component
function sync(entity, renderComponent) {
  renderComponent.matrix.copy(entity.worldMatrix);
}

// ---------------------------------------------------------------- aircraft
class Aircraft {
  constructor(index, colorHex) {
    this.index = index;
    this.colorHex = colorHex;

    // --- visual model (nose points along +Z, Yuka's default forward) ---
    const color = new THREE.Color(colorHex);
    const bodyMat = new THREE.MeshStandardMaterial({
      color, roughness: 0.65, metalness: 0.05,
      emissive: color, emissiveIntensity: 0.12
    });
    const wingMat = new THREE.MeshStandardMaterial({
      color: color.clone().offsetHSL(0, -0.05, 0.12), roughness: 0.88, metalness: 0,
      emissive: color, emissiveIntensity: 0.12
    });
    const detailMat = new THREE.MeshStandardMaterial({
      color: 0x2a2218, roughness: 0.92, metalness: 0.08
    });
    const wheelMat = new THREE.MeshStandardMaterial({
      color: 0x141414, roughness: 0.95, metalness: 0.05
    });
    this.materials = [bodyMat, wingMat];

    const group = new THREE.Group();
    group.matrixAutoUpdate = false;

    // Fuselage — rounded fabric-covered body
    const fuselage = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 2.0, 5, 10), bodyMat);
    fuselage.rotation.x = Math.PI / 2;
    fuselage.position.set(0, 0.04, -0.2);
    group.add(fuselage);

    // Engine cowl
    const cowl = new THREE.Mesh(new THREE.CylinderGeometry(0.36, 0.44, 0.48, 10), bodyMat);
    cowl.rotation.x = Math.PI / 2;
    cowl.position.set(0, 0.04, 1.12);
    group.add(cowl);

    // Open-cockpit fairing
    const cockpit = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.32, 0.52), bodyMat);
    cockpit.position.set(0, 0.26, 0.02);
    group.add(cockpit);

    // Biplane wings
    const wingGeo = new THREE.BoxGeometry(5.8, 0.06, 0.82);
    const lowerWing = new THREE.Mesh(wingGeo, wingMat);
    lowerWing.position.set(0, -0.06, 0.08);
    group.add(lowerWing);

    const upperWing = new THREE.Mesh(wingGeo, wingMat);
    upperWing.position.set(0, 0.58, 0.04);
    group.add(upperWing);

    // Interplane struts
    const strutGeo = new THREE.CylinderGeometry(0.022, 0.022, 0.66, 4);
    for (const x of [-1.65, 1.65]) {
      const strut = new THREE.Mesh(strutGeo, detailMat);
      strut.position.set(x, 0.26, 0.12);
      group.add(strut);
    }

    // Propeller (spins with airspeed in the animation loop)
    const propeller = new THREE.Group();
    propeller.position.set(0, 0.04, 1.42);
    const bladeGeo = new THREE.BoxGeometry(0.1, 1.7, 0.05);
    const bladeA = new THREE.Mesh(bladeGeo, detailMat);
    const bladeB = new THREE.Mesh(bladeGeo, detailMat);
    bladeB.rotation.z = Math.PI / 2;
    propeller.add(bladeA, bladeB);
    group.add(propeller);
    this.propeller = propeller;

    // Empennage — horizontal stab, fin, rudder
    const hStab = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.05, 0.52), wingMat);
    hStab.position.set(0, 0.1, -1.32);
    group.add(hStab);

    const vFin = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.62, 0.48), wingMat);
    vFin.position.set(0, 0.4, -1.35);
    group.add(vFin);

    const rudder = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.42, 0.26), wingMat);
    rudder.position.set(0, 0.36, -1.58);
    group.add(rudder);

    // Tail-dragger landing gear
    const wheelGeo = new THREE.TorusGeometry(0.2, 0.055, 6, 10);
    const legGeo = new THREE.CylinderGeometry(0.028, 0.028, 0.32, 4);
    for (const x of [-0.52, 0.52]) {
      const leg = new THREE.Mesh(legGeo, detailMat);
      leg.position.set(x, -0.2, 0.32);
      group.add(leg);
      const wheel = new THREE.Mesh(wheelGeo, wheelMat);
      wheel.rotation.y = Math.PI / 2;
      wheel.position.set(x, -0.4, 0.32);
      group.add(wheel);
    }

    const skid = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.22, 4), detailMat);
    skid.rotation.x = Math.PI / 2;
    skid.position.set(0, -0.26, -1.52);
    group.add(skid);

    group.traverse(o => { o.userData.aircraft = this; });
    this.group = group;

    // --- yuka vehicle ---
    const v = new YUKA.Vehicle();
    this.cruiseSpeed = THREE.MathUtils.randFloat(8, 18);
    this.minSpeed = this.cruiseSpeed * 0.45;
    v.maxSpeed = this.cruiseSpeed;
    v.maxForce = THREE.MathUtils.randFloat(60, 100);
    v.mass = 1;
    v.boundingRadius = 3.5;
    v.updateNeighborhood = true;
    v.neighborhoodRadius = 28;
    v.smoother = new YUKA.Smoother(18); // smooth orientation -> realistic turns

    v.position.set(
      THREE.MathUtils.randFloatSpread(160),
      THREE.MathUtils.randFloatSpread(120),
      THREE.MathUtils.randFloatSpread(160)
    );
    v.velocity.set(
      THREE.MathUtils.randFloatSpread(2),
      THREE.MathUtils.randFloatSpread(0.6),
      THREE.MathUtils.randFloatSpread(2)
    ).normalize().multiplyScalar(
      THREE.MathUtils.randFloat(this.minSpeed, this.cruiseSpeed)
    );

    const wander = new YUKA.WanderBehavior();
    wander.radius = 6; wander.distance = 12; wander.jitter = 4;
    wander.weight = 0.5;

    const separation = new YUKA.SeparationBehavior();
    separation.weight = 2;

    const alignment = new YUKA.AlignmentBehavior();
    alignment.weight = 0.15;

    const cohesion = new YUKA.CohesionBehavior();
    cohesion.weight = 0.12;

    const containment = new ContainmentBehavior();
    containment.weight = 3;

    const altitude = new AltitudeWanderBehavior();
    altitude.weight = 1;

    for (const b of [wander, separation, alignment, cohesion, containment, altitude]) {
      v.steering.add(b);
    }

    v.setRenderComponent(group, sync);
    this.vehicle = v;

    // --- trail ---
    const positions = new Float32Array(TRAIL_LENGTH * 3);
    for (let i = 0; i < TRAIL_LENGTH; i++) {
      positions[i * 3]     = v.position.x;
      positions[i * 3 + 1] = v.position.y;
      positions[i * 3 + 2] = v.position.z;
    }
    const trailGeo = new THREE.BufferGeometry();
    trailGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    this.trail = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({
      color, transparent: true, opacity: 0.3
    }));
    this.trail.frustumCulled = false;
  }

  updateTrail() {
    const attr = this.trail.geometry.attributes.position;
    attr.array.copyWithin(0, 3); // shift left by one point
    const last = (TRAIL_LENGTH - 1) * 3;
    attr.array[last]     = this.vehicle.position.x;
    attr.array[last + 1] = this.vehicle.position.y;
    attr.array[last + 2] = this.vehicle.position.z;
    attr.needsUpdate = true;
  }

  setHighlighted(on) {
    const intensity = on ? 0.55 : 0.12;
    for (const m of this.materials) m.emissiveIntensity = intensity;
  }
}

const aircraftList = [];
for (let i = 0; i < AIRCRAFT_COUNT; i++) {
  const a = new Aircraft(i, COLORS[i % COLORS.length]);
  aircraftList.push(a);
  entityManager.add(a.vehicle);
  scene.add(a.group, a.trail);
}

// ---------------------------------------------------------------- controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 15;
controls.maxDistance = 700;
controls.target.set(0, 0, 0);

// ---------------------------------------------------------------- follow mode
let followTarget = null;     // Aircraft instance or null
let followDistance = 15;     // distance behind the aircraft

const trackingEl = document.getElementById('tracking');
const fleetEl = document.getElementById('fleet');

// Fleet selector dots
aircraftList.forEach(a => {
  const btn = document.createElement('button');
  btn.style.background = a.colorHex;
  btn.style.color = a.colorHex;
  btn.title = `Follow Aircraft #${a.index} (cruise ${a.cruiseSpeed.toFixed(0)})`;
  btn.setAttribute('aria-label', btn.title);
  btn.addEventListener('click', e => { e.stopPropagation(); follow(a); });
  fleetEl.appendChild(btn);
  a.fleetButton = btn;
});

function updateTrackingPanel(aircraft) {
  const speed = aircraft.vehicle.getSpeed().toFixed(1);
  trackingEl.innerHTML =
    `<span class="swatch" style="background:${aircraft.colorHex};color:${aircraft.colorHex}"></span>` +
    `Tracking: Aircraft #${aircraft.index}<br>` +
    `Speed ${speed} / ${aircraft.cruiseSpeed.toFixed(0)}`;
}

function follow(aircraft) {
  if (followTarget) {
    followTarget.setHighlighted(false);
    followTarget.fleetButton.classList.remove('active');
  }
  followTarget = aircraft;
  aircraft.setHighlighted(true);
  aircraft.fleetButton.classList.add('active');
  controls.enabled = false;
  updateTrackingPanel(aircraft);
}

function release() {
  if (!followTarget) return;
  followTarget.setHighlighted(false);
  followTarget.fleetButton.classList.remove('active');
  // Hand orbit control back, pivoting around where we were looking
  controls.target.set(
    followTarget.vehicle.position.x,
    followTarget.vehicle.position.y,
    followTarget.vehicle.position.z
  );
  followTarget = null;
  controls.enabled = true;
  trackingEl.textContent = '';
}

// ---------------------------------------------------------------- picking
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let downX = 0, downY = 0;

renderer.domElement.addEventListener('pointerdown', e => {
  downX = e.clientX; downY = e.clientY;
});

renderer.domElement.addEventListener('click', e => {
  // Ignore drags (orbiting), only treat near-stationary clicks as picks
  if (Math.hypot(e.clientX - downX, e.clientY - downY) > 5) return;

  pointer.set(
    (e.clientX / innerWidth) * 2 - 1,
    -(e.clientY / innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(aircraftList.map(a => a.group), true);
  const hit = hits.find(h => h.object.userData.aircraft);

  if (hit) follow(hit.object.userData.aircraft);
  else release();
});

window.addEventListener('keydown', e => {
  if (e.key === 'Escape') release();
});

// Wheel adjusts follow distance while tracking (OrbitControls is disabled then)
renderer.domElement.addEventListener('wheel', e => {
  if (!followTarget) return;
  e.preventDefault();
  followDistance = THREE.MathUtils.clamp(followDistance + e.deltaY * 0.02, 6, 90);
}, { passive: false });

// ---------------------------------------------------------------- loop
const _pos = new THREE.Vector3();
const _quat = new THREE.Quaternion();
const _scale = new THREE.Vector3();
const _offset = new THREE.Vector3();
const _desired = new THREE.Vector3();
const _lookAt = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);

  const delta = Math.min(time.update().getDelta(), 0.1);
  entityManager.update(delta);

  for (const c of clouds) {
    c.position.x += c.userData.speed * delta;
    if (c.position.x > 550) c.position.x = -550;
  }

  for (const a of aircraftList) {
    const v = a.vehicle;

    // Safety net: hard clamp inside the box and reflect velocity at walls
    for (const axis of ['x', 'y', 'z']) {
      const limit = HALF - 2;
      if (v.position[axis] > limit) { v.position[axis] = limit; if (v.velocity[axis] > 0) v.velocity[axis] *= -0.5; }
      if (v.position[axis] < -limit) { v.position[axis] = -limit; if (v.velocity[axis] < 0) v.velocity[axis] *= -0.5; }
    }
    // Keep a minimum airspeed so aircraft never hover in place
    const speed = v.getSpeed();
    if (speed > 0.001 && speed < a.minSpeed) v.velocity.multiplyScalar(a.minSpeed / speed);

    a.propeller.rotation.z += speed * 1.4 * delta;
    a.updateTrail();
  }

  if (followTarget) {
    updateTrackingPanel(followTarget);
    const g = followTarget.group;
    g.matrix.decompose(_pos, _quat, _scale);
    _offset.set(0, followDistance * 0.3, -followDistance).applyQuaternion(_quat);
    _desired.copy(_pos).add(_offset);
    camera.position.lerp(_desired, 0.06);
    _lookAt.lerp(_pos, 0.25);
    camera.lookAt(_lookAt);
  } else {
    controls.update();
  }

  renderer.render(scene, camera);
}
animate();

// ---------------------------------------------------------------- resize
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
