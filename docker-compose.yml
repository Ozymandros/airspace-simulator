services:
  dev:
    build:
      context: .
      target: development
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace:cached
      - node_modules:/workspace/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      DOCKER: "true"
    command: pnpm run dev

  web:
    build:
      context: .
      target: production
    ports:
      - "8081:80"

volumes:
  node_modules:
